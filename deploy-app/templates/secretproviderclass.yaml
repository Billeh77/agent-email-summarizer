{{- if .Values.secretProviderClass.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ .Values.app.name }}-kv-sync
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "email-summarizer-ui.labels" . | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: {{ .Values.clientId | quote }}
    keyvaultName: {{ .Values.keyvault | quote }}
    cloudName: ""
    objects: |
      array:
        - |
          objectName: agent-email-summarizer-secrets
          objectType: secret
          objectVersion: ""
    tenantID: {{ .Values.tenantId | quote }}
{{- end }}
